model:
  backbone: swin-base
  pretrained: /root/autodl-tmp/pretrained/mask2former-swin-base-ade-semantic
  num_classes: 2
  num_queries: 100
classes:
  0: background
  1: damage	# 所有病害合并为一类
training:
  image_size:
  - 2720
  - 1530
  batch_size: 1
  accumulation_steps: 8
  lr: 1.0e-05
  backbone_lr_multiplier: 0.1
  max_epochs: 200
  warmup_epochs: 5
  mixed_precision: true
  gradient_checkpointing: true
  num_workers: 4
  save_every_n_epochs: 10
  weight_decay: 0.0001
physical_constraints:
  max_crack_width_px: 35
  max_transverse_span_ratio: 0.9
  min_contour_complexity: 3.0
  min_region_area_px: 100
  shadow_aspect_ratio_threshold: 40.0
class_weights:
- 0.0
- 1.0

loss:
  lambda_native: 1.0
  lambda_weighted: 0.0   # 关闭
  lambda_focal: 0.5      # 降低权重，且 fg_only 改为 False
  lambda_edge: 0.3
